    terms:
      - GhostError
    exactTerms: true
  expected:
    exact:
      - GhostError

- id: ghost-ci-env
  repository: ghost
  category: Environment Variables
  evaluator: FindEnvironmentVariable
  question: Which CI environment variable is read?
  selector:
    nodeTypes:
      - EnvironmentVariable
    terms:
