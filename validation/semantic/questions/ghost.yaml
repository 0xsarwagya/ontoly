- id: ghost-load-create-call
  repository: ghost
  category: Call Graph
  evaluator: FindCallChain
  question: Does loading or creating a record call createGhostId?
  selector:
    edgeTypes:
      - CALLS
    from: loadOrCreateRecord
    to: createGhostId
    exactTerms: true
  expected:
    exact:
      - loadOrCreateRecord -> createGhostId
    edges:
      - type: CALLS
        from: loadOrCreateRecord
        to: createGhostId
