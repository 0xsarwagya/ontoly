- id: ghost-create-entrypoint
  repository: ghost
  category: Functions
  evaluator: FindEntrypoint
  question: What is the browser entrypoint for creating a Ghost identity?
  selector:
    nodeTypes:
      - Function
    terms:
      - createGhost
    exactTerms: true
  expected:
    exact:
      - createGhost

- id: ghost-interface
  repository: ghost
  category: Interfaces
  evaluator: ArchitectureSummary
  question: Which public interface represents a Ghost client?
  selector:
    nodeTypes:
      - Interface
      - Class
    terms:
      - Ghost
    exactTerms: true
  expected:
    exact:
      - Ghost

- id: ghost-error-class
  repository: ghost
  category: Classes
  evaluator: ArchitectureSummary
  question: Which error class represents Ghost failures?
  selector:
    nodeTypes:
