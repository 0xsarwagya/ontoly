name: Bug report
description: Report a reproducible Ontoly defect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Exact commands and repository shape needed to reproduce.
      value: |
        1. Run `...`
        2. Observe `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Evidence
      description: Attach diagnostics, statistics, validation reports, or MCP request and response JSON.
  - type: checkboxes
    id: privacy
    attributes:
      label: Artifact privacy
      options:
        - label: I have sanitized attached artifacts and have not included private source code, secrets, customer data, or production graph artifacts.
          required: true
  - type: input
    id: version
    attributes:
      label: Ontoly version
      placeholder: 1.0.0-rc.1
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Node 20 or 22, pnpm 10, macOS/Linux/Windows
    validations:
      required: true
